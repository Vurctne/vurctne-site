          )}
          {!replayMode && (
            <button onClick={handleEndTurn} disabled={!isMyTurn || state?.gameOver}
              className="px-3 py-1.5 rounded-lg text-sm font-semibold relative"
              style={{ background: isMyTurn && !state?.gameOver ? '#f59e0b' : '#475569', color: '#fff', boxShadow: tutorialButtonHint === 'endButton' ? '0 0 0 2px #fbbf24' : 'none' }}>
              End ▶
              {tutorialButtonHint === 'endButton' && <span className="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-yellow-400 animate-ping"></span>}
            </button>
          )}
        </div>
      </div>

      {curLevel && !replayMode && (<div className="text-center text-xs py-1" style={{ background: th.panel, color: '#94a3b8' }}>🗺️ L{curLevel.id}: {curLevel.name} {MAP_SHAPES[curLevel.shape]?.icon} · ≤{curLevel.targetTurns}t</div>)}
      {state?.blitz && !replayMode && (<div className="text-center text-xs py-1" style={{ background: 'linear-gradient(90deg,#ef4444,#dc2626)', color: '#fff' }}>⚡ Blitz mode · win fast for bonus 💰</div>)}
      {state?.objectives && state.objectives.length > 0 && !replayMode && !state.tutorial && (
        <div className="px-2 py-1.5 flex gap-1.5 overflow-x-auto" style={{ background: th.panel, borderBottom: `1px solid ${th.border}` }}>
          {state.objectives.map(obj => (
            <div key={obj.id} className="flex-1 min-w-0 rounded-lg px-2 py-1 text-xs flex items-center gap-1.5" style={{ background: obj.done ? 'linear-gradient(90deg,#10b981,#059669)' : '#0f172a', border: `1px solid ${obj.done ? '#10b981' : th.border}`, opacity: obj.done ? 1 : 0.95 }}>
              <span className="text-xs">{obj.done ? '✓' : '○'}</span>
              <span className="flex-1 truncate">{obj.name}</span>
              <span className="text-amber-400 font-bold whitespace-nowrap">{obj.progress}/{obj.target}</span>
              <span className="text-xs opacity-70">+{obj.reward}</span>
            </div>
          ))}
        </div>
      )}

      <div ref={containerRef} className="flex-1 flex items-center justify-center overflow-hidden relative">
        <canvas ref={canvasRef} onClick={handleCanvasClick} style={{ borderRadius: 8, cursor: !replayMode && isMyTurn ? 'pointer' : 'default', touchAction: 'manipulation' }} />

        {!replayMode && !state?.gameOver && isMyTurn && state?.threats && Object.keys(state.threats).length > 0 && !state?.tutorial && (
          <div className="absolute top-2 left-1/2 z-20 px-2 py-1 rounded-lg text-xs font-semibold flex items-center gap-1 shadow-lg" style={{ transform: 'translateX(-50%)', background: 'rgba(239, 68, 68, 0.95)', color: '#fff', border: '1px solid #b91c1c' }}>
            ⚠️ {Object.keys(state.threats).length} tile{Object.keys(state.threats).length > 1 ? 's' : ''} at risk
          </div>
        )}

        {tutorialStepDef && !state?.gameOver && (
          <div className="absolute top-4 left-1/2 z-30 px-3" style={{ transform: 'translateX(-50%)', maxWidth: 'min(440px, 90vw)' }}>
            <div className="rounded-2xl p-4 shadow-2xl relative" style={{ background: 'linear-gradient(135deg, rgba(251,191,36,0.97), rgba(245,158,11,0.97))', color: '#1f2937', border: '2px solid #f59e0b' }}>
              <div className="absolute -top-2 left-4 px-2 py-0.5 rounded-full text-xs font-bold" style={{ background: '#1f2937', color: '#fbbf24' }}>Tutorial {tutorialStep + 1}/{TUTORIAL_STEPS.length}</div>
              <div className="text-sm font-semibold leading-relaxed whitespace-pre-line">{tutorialStepDef.hint}</div>
              <div className="flex items-center justify-between mt-3 gap-2">
                <button onClick={skipTutorial} className="text-xs underline opacity-70">Skip</button>
                <div className="flex gap-1 flex-1 justify-center">
                  {TUTORIAL_STEPS.map((_, i) => (<div key={i} className="w-1.5 h-1.5 rounded-full" style={{ background: i <= tutorialStep ? '#1f2937' : 'rgba(31,41,55,0.3)' }} />))}
                </div>
                {tutorialStepDef.requireNext && (
                  <button onClick={() => { SFX.tap(); const s = clone(state); s.tutorial.step = Math.min(TUTORIAL_STEPS.length - 1, s.tutorial.step + 1); setState(s); }} className="px-3 py-1.5 rounded-lg text-xs font-bold" style={{ background: '#1f2937', color: '#fbbf24' }}>Next →</button>
                )}
              </div>
            </div>
          </div>
        )}
      </div>

      {replayMode && (
        <div className="p-3" style={{ background: th.panel, borderTop: `1px solid ${th.border}` }}>
          <div className="flex items-center gap-2 mb-2">
            <button onClick={() => { setReplayTurn(0); setReplayPlaying(false); }} className="px-3 py-2 rounded bg-slate-700 text-sm">⏮</button>
            <button onClick={() => setReplayPlaying(p => !p)} className="px-3 py-2 rounded bg-amber-500 text-sm font-semibold">{replayPlaying ? '⏸' : '▶'}</button>
            <button onClick={() => setReplayTurn(turnHistory.length - 1)} className="px-3 py-2 rounded bg-slate-700 text-sm">⏭</button>
            <div className="flex-1 text-xs text-slate-400 text-center">Turn {replayTurn + 1} / {turnHistory.length}</div>
            <button onClick={() => { setReplayMode(false); setReplayPlaying(false); }} className="px-3 py-2 rounded bg-slate-700 text-sm">✕</button>
          </div>
          <input type="range" min={0} max={Math.max(0, turnHistory.length - 1)} value={replayTurn} onChange={e => { setReplayTurn(+e.target.value); setReplayPlaying(false); }} className="w-full"/>
        </div>
      )}

      {!replayMode && (
        <div className="p-2" style={{ background: th.panel, borderTop: `1px solid ${th.border}` }}>
          {state?.gameOver ? (
            <div className="text-center py-3 px-2">
              <div className="text-lg font-bold mb-1">{state.winner === 0 ? '🏆 Victory!' : state.winner != null ? `P${state.winner+1} wins` : 'Draw'}</div>
              <div className="text-xs text-slate-400 mb-3">Turn {state.turn}</div>
              <div className="flex gap-2 justify-center flex-wrap">
                {turnHistory.length > 1 && !state.tutorial && (<button onClick={() => { setReplayMode(true); setReplayTurn(0); setReplayPlaying(true); }} className="px-3 py-2 rounded-lg text-sm font-semibold bg-purple-600">📽️ Replay</button>)}
                <button onClick={backToMenu} className="px-4 py-2 rounded-lg bg-amber-500 font-semibold text-sm">Menu</button>
                {curLevel && (() => {
                  const next = CAMPAIGN.find(l => l.id === curLevel.id + 1);
                  if (state.winner === 0 && next) return (<button onClick={() => startCampaign(next)} className="px-4 py-2 rounded-lg bg-emerald-500 font-semibold text-sm">Next →</button>);
                  if (state.winner !== 0) return (<button onClick={() => startCampaign(curLevel)} className="px-4 py-2 rounded-lg bg-slate-700 font-semibold text-sm">Retry</button>);
                })()}
                {state.mode === 'solo' && !curLevel && (<button onClick={startSolo} className="px-4 py-2 rounded-lg bg-slate-700 font-semibold text-sm">Rematch</button>)}
              </div>
            </div>
          ) : selT ? (
            <div>
              <div className="text-xs text-slate-400 mb-2 px-1 flex items-center gap-2 flex-wrap">
                <span>{selT.owner === -1 ? 'Neutral' : `P${selT.owner+1}`}</span>
                {selProv && <span>· 💰{selProv.gold} · {selProv.size} tiles</span>}
                {selT.unit && <span>· {U_NAME[selT.unit.level]}{selT.unit.moved ? '(done)' : ''}</span>}
                {selT.struct === 'tower' && <span>· Tower</span>}
                {selT.struct === 'stower' && <span>· Strong Tower</span>}
                {selT.struct === 'farm' && <span>· Farm +4</span>}
                {selT.struct === 'capital' && <span>· Capital</span>}
              </div>
              {isMyTurn && selT.owner === cur && selProv && (
                <div className="grid grid-cols-4 gap-1 text-xs">
                  {[1, 2, 3, 4].map(lv => (
                    <button key={lv} onClick={() => handleBuy(lv)} disabled={selProv.gold < U_COST[lv]}
                      className="py-2 rounded font-medium flex flex-col items-center relative"
                      style={{ background: selProv.gold >= U_COST[lv] ? '#334155' : '#1e293b', opacity: selProv.gold >= U_COST[lv] ? 1 : 0.5, boxShadow: tutorialButtonHint === 'peasantBtn' && lv === 1 ? '0 0 0 2px #fbbf24' : 'none' }}>
                      <span className="text-base">{U_ICON[lv]}</span><span>💰{U_COST[lv]}</span>
                      {tutorialButtonHint === 'peasantBtn' && lv === 1 && (<span className="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-yellow-400 animate-ping"></span>)}
                    </button>
                  ))}
                  <button onClick={() => { SFX.tap(); setBuildMode(buildMode === 'tower' ? null : 'tower'); }} disabled={selProv.gold < TOWER_COST}
                    className="py-2 rounded font-medium flex flex-col items-center relative"
                    style={{ background: buildMode === 'tower' ? '#f59e0b' : (selProv.gold >= TOWER_COST ? '#334155' : '#1e293b'), opacity: selProv.gold >= TOWER_COST ? 1 : 0.5, boxShadow: tutorialButtonHint === 'towerBtn' ? '0 0 0 2px #fbbf24' : 'none' }}>
                    <span className="text-base">🗼</span><span>💰{TOWER_COST}</span>
                    {tutorialButtonHint === 'towerBtn' && (<span className="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-yellow-400 animate-ping"></span>)}
                  </button>
                  <button onClick={() => { SFX.tap(); setBuildMode(buildMode === 'stower' ? null : 'stower'); }} disabled={selProv.gold < STOWER_COST}
                    className="py-2 rounded font-medium flex flex-col items-center"
                    style={{ background: buildMode === 'stower' ? '#f59e0b' : (selProv.gold >= STOWER_COST ? '#334155' : '#1e293b'), opacity: selProv.gold >= STOWER_COST ? 1 : 0.5 }}>
                    <span className="text-base">🏯</span><span>💰{STOWER_COST}</span>
                  </button>
                  <button onClick={() => { SFX.tap(); setBuildMode(buildMode === 'farm' ? null : 'farm'); }} disabled={selProv.gold < fcost}
                    className="py-2 rounded font-medium flex flex-col items-center col-span-2 relative"
                    style={{ background: buildMode === 'farm' ? '#f59e0b' : (selProv.gold >= fcost ? '#334155' : '#1e293b'), opacity: selProv.gold >= fcost ? 1 : 0.5, boxShadow: tutorialButtonHint === 'farmBtn' ? '0 0 0 2px #fbbf24' : 'none' }}>
                    <span className="text-base">🌾 Farm +4</span><span>💰{fcost}</span>
                    {tutorialButtonHint === 'farmBtn' && (<span className="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-yellow-400 animate-ping"></span>)}
                  </button>
                </div>
              )}
              {buildMode && (<div className="text-xs text-amber-400 mt-2 text-center">Tap {buildMode === 'farm' ? 'a tile adjacent to your farm/capital' : 'a tile'} — or tap again to cancel.</div>)}
            </div>
          ) : (
            <div className="text-xs text-slate-400 text-center py-1">
              {isMyTurn ? 'Tap a tile. Tap your unit then a highlighted tile to move.' : `Waiting for ${state?.aiPlayers?.[cur] ? AI_NAMES[state.aiPlayers[cur]] : `P${cur+1}`}…`}
            </div>
          )}
        </div>
      )}

      {toast && <Toast toast={toast} />}
    </div>
  );
}

function Toast({ toast }) {
  return (
    <div className="fixed top-4 left-1/2 px-4 py-2 rounded-lg text-sm font-semibold shadow-xl z-50"
      style={{ transform: 'translateX(-50%)',
        background: toast.type === 'win' ? 'linear-gradient(90deg,#f59e0b,#ea580c)'
          : toast.type === 'ach' ? 'linear-gradient(90deg,#8b5cf6,#6366f1)'
          : toast.type === 'daily' ? 'linear-gradient(90deg,#10b981,#059669)'
          : toast.type === 'ad' ? '#10b981'
          : toast.type === 'loss' ? '#374151' : '#1e293b',
        color: '#fff', border: '1px solid rgba(255,255,255,0.2)' }}>
      {toast.msg}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Hexfall />);
</script>
</body>
</html>
