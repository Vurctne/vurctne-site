<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>懂食江湖 · Vurctne Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #1a0a0a;
    color: #FFF8E7;
    font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
  }
  #login-shell {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, rgba(215, 38, 61, 0.4) 0%, transparent 60%),
                linear-gradient(180deg, #1a0a0a 0%, #2A1A14 100%);
    padding: 24px;
  }
  .login-card {
    background: rgba(255, 248, 231, 0.04);
    border: 1px solid rgba(244, 180, 0, 0.25);
    border-radius: 16px;
    padding: 40px 32px;
    max-width: 380px; width: 100%;
    backdrop-filter: blur(12px);
    box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  }
  .login-card h1 {
    font-size: 22px; font-weight: 700; margin-bottom: 6px;
    background: linear-gradient(135deg, #D7263D, #F4B400);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .login-card .sub { font-size: 13px; color: rgba(255, 248, 231, 0.55); margin-bottom: 28px; letter-spacing: 0.5px; }
  .login-card label { display: block; font-size: 12px; color: #F4B400; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
  .login-card input[type="password"] {
    width: 100%; padding: 14px 16px; font-size: 15px;
    background: rgba(0,0,0,0.35); color: #FFF8E7;
    border: 1px solid rgba(244, 180, 0, 0.3); border-radius: 8px;
    outline: none; font-family: ui-monospace, monospace;
    transition: border-color 200ms;
  }
  .login-card input[type="password"]:focus { border-color: #F4B400; }
  .login-card button {
    margin-top: 20px; width: 100%;
    padding: 14px; font-size: 15px; font-weight: 700;
    background: linear-gradient(135deg, #D7263D, #F4B400);
    color: #fff; border: none; border-radius: 8px; cursor: pointer;
    transition: transform 100ms, box-shadow 200ms;
  }
  .login-card button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(215, 38, 61, 0.35); }
  .login-card button:disabled { opacity: 0.6; cursor: wait; transform: none; box-shadow: none; }
  .login-card .err { color: #FF6B6B; font-size: 13px; margin-top: 12px; min-height: 18px; }
  .login-card .hint { font-size: 11px; color: rgba(255, 248, 231, 0.35); margin-top: 24px; line-height: 1.6; text-align: center; }

  #frame-shell { position: fixed; inset: 0; display: none; }
  #frame-shell.active { display: block; }
  #demo-frame { width: 100%; height: 100%; border: none; display: block; background: #1a0a0a; }

  #wm-text {
    position: fixed; inset: 0; pointer-events: none; z-index: 10001;
    overflow: hidden; opacity: 0.05;
    transform: rotate(-30deg) scale(2); transform-origin: center;
    font-family: ui-monospace, monospace; font-size: 13px;
    color: #FFF8E7; white-space: nowrap;
    line-height: 80px; padding: 40px;
    word-spacing: 80px;
  }

  #copy-modal {
    position: fixed; inset: 0; z-index: 99999;
    background: rgba(10, 5, 5, 0.75); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center;
  }
  #copy-modal.active { display: flex; }
  .modal-card {
    max-width: 420px; padding: 32px;
    background: linear-gradient(135deg, #2A0A0A, #1a0a0a);
    border: 1px solid #D7263D; border-radius: 14px;
    box-shadow: 0 20px 60px rgba(215, 38, 61, 0.4);
    text-align: center;
  }
  .modal-card .icon { font-size: 40px; margin-bottom: 16px; }
  .modal-card h2 { color: #D7263D; font-size: 18px; margin-bottom: 12px; }
  .modal-card p { color: rgba(255, 248, 231, 0.85); font-size: 14px; line-height: 1.7; margin-bottom: 20px; }
  .modal-card .who { font-family: ui-monospace, monospace; font-size: 12px; color: #F4B400; padding: 8px 12px; background: rgba(0,0,0,0.4); border-radius: 6px; margin-bottom: 20px; word-break: break-all; }
  .modal-card button {
    padding: 10px 28px; background: #F4B400; color: #1a0a0a; border: none;
    border-radius: 6px; font-weight: 700; cursor: pointer;
  }
</style>
</head>
<body>

<div id="login-shell">
  <form class="login-card" id="login-form" autocomplete="off">
    <h1>懂食江湖 · 投资人 Demo</h1>
    <p class="sub">Authorized access only · Vurctne Games</p>
    <label for="pw">Access password</label>
    <input type="password" id="pw" name="pw" autocomplete="off" autofocus>
    <button type="submit" id="submit-btn">解锁 Demo</button>
    <div class="err" id="err"></div>
    <p class="hint">本页面已启用复制检测与水印追踪。<br>未经授权的复制、截图、保存行为将被记录。</p>
  </form>
</div>

<div id="frame-shell">
  <iframe id="demo-frame" sandbox="allow-scripts allow-same-origin"></iframe>
  <div id="wm-text"></div>
</div>

<div id="copy-modal">
  <div class="modal-card">
    <div class="icon">⚠️</div>
    <h2>复制行为已记录</h2>
    <p>您的操作已被系统检测并记录至 Vurctne Games 服务器。<br>本 Demo 受保密协议保护，未经授权的复制、截图、传播将追究法律责任。</p>
    <div class="who" id="modal-who">—</div>
    <button id="modal-ok">我已知悉</button>
  </div>
</div>

let session = null; // { investor_id, investor_name, demo_token }

function b64decode(s) {
  const bin = atob(s);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function decryptBundle(keyB64) {
  const blob = b64decode(CIPHERTEXT_B64);
  const iv = blob.slice(0, 12);
  const ctAndTag = blob.slice(12);
  const keyBytes = b64decode(keyB64);
  const key = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ctAndTag);
  return new TextDecoder('utf-8').decode(plain);
}

// ============ EVENT BEACON ============
async function postEvent(action, detail) {
  if (!session) return; // not unlocked yet
  try {
    await fetch('/api/copy-event', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action,
        detail: String(detail || '').slice(0, 240),
        demo_token: session.demo_token,
        ua: navigator.userAgent.slice(0, 200)
      }),
      keepalive: true
    });
  } catch (_) {}
}

let lastModalAt = 0;
function showCopyModal() {
  const now = Date.now();
  if (now - lastModalAt < 1500) return;
  lastModalAt = now;
  if (session) document.getElementById('modal-who').textContent = session.investor_name;
  document.getElementById('copy-modal').classList.add('active');
}
async function reportSuspicious(action, detail) {
  await postEvent(action, detail);
  showCopyModal();
}
async function logEvent(action, detail) { await postEvent(action, detail); }

document.getElementById('modal-ok').onclick = () => document.getElementById('copy-modal').classList.remove('active');

// ============ PROTECTION INJECTION ============
function installProtection(targetDoc) {
  ['copy', 'cut'].forEach(ev =>
    targetDoc.addEventListener(ev, e => {
      const sel = (targetDoc.getSelection ? targetDoc.getSelection().toString() : '') || '';
      reportSuspicious(ev, sel);
    }, true)
  );
  targetDoc.addEventListener('contextmenu', e => {
    reportSuspicious('contextmenu', `(${e.clientX},${e.clientY})`);
  }, true);
  targetDoc.addEventListener('dragstart', e => {
    reportSuspicious('dragstart', e.target && e.target.tagName);
  }, true);
  targetDoc.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    const ctrl = e.ctrlKey || e.metaKey;
    if (ctrl && (k === 'c' || k === 'a' || k === 's' || k === 'p' || k === 'u')) {
      reportSuspicious('shortcut', `${e.metaKey ? 'Meta' : 'Ctrl'}+${e.key.toUpperCase()}`);
    } else if (k === 'f12') {
      reportSuspicious('shortcut', 'F12');
    } else if (k === 'printscreen') {
      reportSuspicious('shortcut', 'PrintScreen');
    } else if (ctrl && e.shiftKey && (k === 'i' || k === 'j' || k === 'c')) {
      reportSuspicious('shortcut', `${e.metaKey ? 'Meta' : 'Ctrl'}+Shift+${e.key.toUpperCase()}`);
    }
  }, true);
}

function paintWatermark() {
  if (!session) return;
  const tile = document.getElementById('wm-text');
  tile.textContent = (session.investor_name + '   ').repeat(120);
}

// ============ LOGIN ============
const form = document.getElementById('login-form');
const errEl = document.getElementById('err');
const submitBtn = document.getElementById('submit-btn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.textContent = '';
  submitBtn.disabled = true;
  submitBtn.textContent = '解锁中…';
  const pw = document.getElementById('pw').value;
  try {
    // Server validates the password and returns identity + bundle key
    const r = await fetch('/api/unlock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (r.status === 401) throw new Error('wrong-password');
    if (!r.ok) throw new Error('server-error');
    const data = await r.json(); // { ok, investor_id, investor_name, demo_token, bundle_key }

    // Decrypt the bundle locally with the server-issued key
    const html = await decryptBundle(data.bundle_key);
    if (!html.startsWith('<!DOCTYPE') && !html.startsWith('<html')) {
      throw new Error('decrypt-sanity');
    }

    session = { investor_id: data.investor_id, investor_name: data.investor_name, demo_token: data.demo_token };

    document.getElementById('login-shell').style.display = 'none';
    document.getElementById('frame-shell').classList.add('active');
    const frame = document.getElementById('demo-frame');
    frame.srcdoc = html;
    frame.onload = () => {
      try { installProtection(frame.contentDocument); } catch (_) {}
      paintWatermark();
    };
    installProtection(document);
  } catch (err) {
    submitBtn.disabled = false;
    submitBtn.textContent = '解锁 Demo';
    if (err.message === 'wrong-password') errEl.textContent = '密码错误，请重试';
    else errEl.textContent = '解锁失败，请稍后重试';
  }
});

// Block view-source on the wrapper
document.addEventListener('keydown', e => {
  const ctrl = e.ctrlKey || e.metaKey;
  if (ctrl && e.key.toLowerCase() === 'u') {
    e.preventDefault();
    if (document.getElementById('frame-shell').classList.contains('active') && session) {
      reportSuspicious('shortcut', 'view-source');
    }
  }
}, true);
</script>
