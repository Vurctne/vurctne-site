<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Hotpot Admin Dashboard · Vurctne</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #1a0a0a; --bg-2: #2A1A14;
    --ink: #FFF8E7; --ink-soft: rgba(255, 248, 231, 0.6); --ink-faint: rgba(255, 248, 231, 0.35);
    --line: rgba(244, 180, 0, 0.2);
    --hot: #D7263D; --gold: #F4B400; --warn: #FF6B6B; --ok: #4ECDC4; --muted: #888;
  }
  html, body {
    background: linear-gradient(180deg, var(--bg), var(--bg-2));
    color: var(--ink);
    font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh; font-size: 14px; line-height: 1.5;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  header.top { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); padding-bottom: 16px; margin-bottom: 24px; }
  header.top h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--hot), var(--gold)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  header.top .meta { font-size: 11px; color: var(--ink-faint); display: flex; gap: 16px; align-items: center; }
  header.top .meta button { background: transparent; color: var(--ink-soft); border: 1px solid var(--line); padding: 6px 12px; font-size: 11px; border-radius: 6px; cursor: pointer; letter-spacing: 0.5px; }
  header.top .meta button:hover { border-color: var(--gold); color: var(--ink); }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat { background: rgba(255, 248, 231, 0.03); border: 1px solid var(--line); border-radius: 10px; padding: 16px; }
  .stat .label { font-size: 10px; color: var(--gold); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 6px; }
  .stat .value { font-size: 26px; font-weight: 700; color: var(--ink); font-feature-settings: "tnum"; }
  .stat.warn .value { color: var(--warn); }

  section { margin-bottom: 36px; }
  h2 { font-size: 13px; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(244, 180, 0, 0.08); vertical-align: middle; }
  th { color: var(--ink-soft); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; background: rgba(0,0,0,0.2); }
  td.num { text-align: right; font-feature-settings: "tnum"; }
  td .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; letter-spacing: 0.5px; }
  td .pill.ok { background: rgba(78, 205, 196, 0.15); color: var(--ok); }
  td .pill.warn { background: rgba(255, 107, 107, 0.15); color: var(--warn); }
  td .pill.muted { background: rgba(255, 248, 231, 0.05); color: var(--ink-faint); }
  td .pill.revoked { background: rgba(136, 136, 136, 0.2); color: var(--muted); text-decoration: line-through; }
  td button { background: transparent; color: var(--gold); border: 1px solid var(--line); padding: 4px 10px; font-size: 11px; border-radius: 5px; cursor: pointer; margin-right: 4px; }
  td button:hover { border-color: var(--gold); }
  td button.danger { color: var(--warn); }
  td button.danger:hover { border-color: var(--warn); }

  .add-form { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .add-form input { background: rgba(0,0,0,0.35); color: var(--ink); border: 1px solid var(--line); border-radius: 6px; padding: 8px 12px; font-size: 13px; outline: none; }
  .add-form input:focus { border-color: var(--gold); }
  .add-form input.name { flex: 0 0 200px; }
  .add-form input.note { flex: 1; min-width: 200px; }
  .add-form button { background: linear-gradient(135deg, var(--hot), var(--gold)); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; }

  .empty { color: var(--ink-faint); padding: 16px; font-style: italic; }

  /* Drawer for per-investor events */
  #drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(560px, 95vw); background: var(--bg-2); border-left: 1px solid var(--line); box-shadow: -12px 0 48px rgba(0,0,0,0.5); transform: translateX(100%); transition: transform 220ms ease; overflow-y: auto; z-index: 100; }
  #drawer.open { transform: translateX(0); }
  #drawer header { padding: 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
  #drawer header h3 { font-size: 14px; color: var(--gold); }
  #drawer header .close { background: none; border: none; color: var(--ink-soft); font-size: 22px; cursor: pointer; }
  #drawer .events { padding: 16px 20px; }
  .ev { padding: 10px 0; border-bottom: 1px dashed rgba(244, 180, 0, 0.1); }
  .ev .ts { font-size: 11px; color: var(--ink-faint); font-family: ui-monospace, monospace; }
  .ev .action { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-right: 8px; }
  .ev .action.copy, .ev .action.cut, .ev .action.contextmenu, .ev .action.dragstart { background: rgba(255, 107, 107, 0.15); color: var(--warn); }
  .ev .action.shortcut { background: rgba(244, 180, 0, 0.15); color: var(--gold); }
  .ev .action.unlock-success { background: rgba(78, 205, 196, 0.15); color: var(--ok); }
  .ev .action.unlock-fail { background: rgba(255, 107, 107, 0.2); color: var(--warn); }
  .ev .action.unknown { background: rgba(255, 248, 231, 0.05); color: var(--ink-faint); }
  .ev .detail { font-size: 12px; color: var(--ink-soft); font-family: ui-monospace, monospace; word-break: break-all; margin-top: 4px; }
  .ev .meta { font-size: 10px; color: var(--ink-faint); margin-top: 4px; }

  /* Password reveal modal */
  #pw-modal { position: fixed; inset: 0; z-index: 200; background: rgba(10, 5, 5, 0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 24px; }
  #pw-modal.open { display: flex; }
  .pw-card { max-width: 480px; width: 100%; padding: 32px; background: linear-gradient(135deg, #2A1A14, #1a0a0a); border: 1px solid var(--gold); border-radius: 14px; box-shadow: 0 20px 60px rgba(244, 180, 0, 0.2); }
  .pw-card h3 { color: var(--gold); margin-bottom: 8px; font-size: 16px; }
  .pw-card .who { font-size: 13px; color: var(--ink-soft); margin-bottom: 18px; }
  .pw-card .warn-line { font-size: 11px; color: var(--warn); margin-bottom: 12px; letter-spacing: 0.5px; }
  .pw-card .pw-box { font-family: ui-monospace, monospace; font-size: 18px; padding: 16px; background: rgba(0,0,0,0.5); border: 1px dashed var(--gold); border-radius: 8px; text-align: center; word-break: break-all; letter-spacing: 1px; user-select: all; }
  .pw-card .actions { display: flex; gap: 8px; margin-top: 18px; }
  .pw-card button { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 13px; }
  .pw-card .copy-btn { background: var(--gold); color: var(--bg); }
  .pw-card .close-btn { background: rgba(255, 248, 231, 0.08); color: var(--ink); }

  .loading { text-align: center; padding: 48px; color: var(--ink-faint); }

  @media (max-width: 720px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .add-form { flex-direction: column; }
    .add-form input.name, .add-form input.note { flex: 1; }
    table { font-size: 12px; }
    th, td { padding: 8px; }
  }
</style>
</head>
<body>

<div class="container">
  <header class="top">
    <h1>Hotpot Admin Dashboard</h1>
    <div class="meta">
      <span id="server-time">—</span>
      <button id="refresh">Refresh</button>
      <button id="logout">Sign out</button>
    </div>
  </header>

  <div id="content"><div class="loading">Loading…</div></div>
</div>

<div id="drawer">
  <header><h3 id="drawer-title">Events</h3><button class="close" id="drawer-close">×</button></header>
  <div class="events" id="drawer-events"></div>
</div>

<div id="pw-modal">
  <div class="pw-card">
    <h3 id="pw-title">投资人密码</h3>
    <div class="who" id="pw-who">—</div>
    <div class="warn-line">⚠ 此密码只显示一次。请立即复制并安全保存。</div>
    <div class="pw-box" id="pw-value">—</div>
    <div class="actions">
      <button class="copy-btn" id="pw-copy">复制密码</button>
      <button class="close-btn" id="pw-close">关闭</button>
    </div>
  </div>
</div>

<script>
async function api(path, opts = {}) {
  const r = await fetch(path, { credentials: 'include', cache: 'no-store', ...opts });
  if (r.status === 401) { location.href = '/hotpot/admin/'; return null; }
  if (!r.ok) {
    let body = ''; try { body = await r.text(); } catch (_) {}
    throw new Error(`API ${path} → ${r.status} ${body}`);
  }
  return r.json();
}

function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtTs(ms) { if (!ms) return '—'; return new Date(ms).toLocaleString('zh-CN', { hour12: false }); }
function fmtRelative(ms) {
  if (!ms) return '—';
  const diff = Date.now() - ms;
  const m = Math.floor(diff / 60000);
  if (m < 1) return '刚刚';
  if (m < 60) return `${m}分钟前`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}小时前`;
  return `${Math.floor(h / 24)}天前`;
}

let last = null;

async function loadSummary() {
  const data = await api('/hotpot/admin/api/summary');
  if (!data) return;
  last = data;
  render(data);
}

function render(data) {
  document.getElementById('server-time').textContent = `Server: ${fmtTs(data.server_time)}`;
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="label">投资人数</div><div class="value">${data.investors.filter(i => !i.revoked_at).length}</div></div>
      <div class="stat"><div class="label">事件总数</div><div class="value">${data.totals.events}</div></div>
      <div class="stat"><div class="label">24h 内事件</div><div class="value">${data.totals.events_24h}</div></div>
      <div class="stat warn"><div class="label">可疑行为</div><div class="value">${data.totals.suspicious}</div></div>
    </div>

    <section>
      <h2>投资人 / 密码列表</h2>
      <form class="add-form" id="add-form">
        <input class="name" name="name" placeholder="投资人名称（如 Alice 或 Sequoia）" required>
        <input class="note" name="note" placeholder="备注（可选 — 公司、引荐人、阶段…）">
        <button type="submit">添加 + 生成密码</button>
      </form>
      <table>
        <thead><tr>
          <th>名称</th><th>备注</th><th>状态</th>
          <th class="num">解锁次数</th><th class="num">可疑行为</th>
          <th>最近访问</th><th>添加时间</th><th>操作</th>
        </tr></thead>
        <tbody>${
          data.investors.length === 0
            ? `<tr><td colspan="8" class="empty">还没有投资人 — 在上方添加一个开始。</td></tr>`
            : data.investors.map(i => {
                let pill = '<span class="pill muted">未访问</span>';
                if (i.revoked_at) pill = '<span class="pill revoked">已撤销</span>';
                else if (i.visits > 0) pill = '<span class="pill ok">活跃</span>';
                return `
                <tr>
                  <td><strong>${escapeHtml(i.name)}</strong></td>
                  <td>${escapeHtml(i.note || '—')}</td>
                  <td>${pill}</td>
                  <td class="num">${i.visits || 0}</td>
                  <td class="num">${(i.suspicious || 0) > 0 ? `<span style="color:var(--warn)">${i.suspicious}</span>` : 0}</td>
                  <td>${i.last_seen ? fmtRelative(i.last_seen) : '—'}</td>
                  <td>${fmtRelative(i.added_at)}</td>
                  <td>
                    <button data-events="${i.id}">事件</button>
                    <button data-regen="${i.id}" data-name="${escapeHtml(i.name)}">换密码</button>
                    ${i.revoked_at
                      ? `<button data-restore="${i.id}">恢复</button>`
                      : `<button class="danger" data-revoke="${i.id}" data-name="${escapeHtml(i.name)}">撤销</button>`}
                    <button class="danger" data-delete="${i.id}" data-name="${escapeHtml(i.name)}">删除</button>
                  </td>
                </tr>`;
              }).join('')
        }</tbody>
      </table>
    </section>

    ${data.recent_unlock_fails && data.recent_unlock_fails.length > 0 ? `
    <section>
      <h2>⚠ 24小时内的密码错误尝试</h2>
      <table>
        <thead><tr><th>时间</th><th>IP</th><th>国家</th><th>User-Agent</th></tr></thead>
        <tbody>${data.recent_unlock_fails.map(f => `
          <tr>
            <td>${fmtRelative(f.ts)} (${fmtTs(f.ts)})</td>
            <td>${escapeHtml(f.ip)}</td>
            <td>${escapeHtml(f.country)}</td>
            <td style="font-size:11px;color:var(--ink-faint);">${escapeHtml((f.ua || '').slice(0, 100))}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </section>` : ''}
  `;
  attachHandlers();
}

function attachHandlers() {
  document.getElementById('add-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const name = fd.get('name').trim();
    const note = (fd.get('note') || '').trim();
    if (!name) return;
    try {
      const r = await api('/hotpot/admin/api/investors', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, note })
      });
      e.target.reset();
      showPasswordModal(name, r.password, '已为该投资人生成密码');
      await loadSummary();
    } catch (err) { alert('添加失败: ' + err.message); }
  });

  document.querySelectorAll('[data-events]').forEach(b => b.onclick = () => openDrawer(parseInt(b.getAttribute('data-events'), 10)));
  document.querySelectorAll('[data-regen]').forEach(b => b.onclick = async () => {
    const id = parseInt(b.getAttribute('data-regen'), 10);
    const name = b.getAttribute('data-name');
    if (!confirm(`为 ${name} 重新生成密码？旧密码将立即失效。`)) return;
    try {
      const r = await api('/hotpot/admin/api/investors/regenerate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      showPasswordModal(name, r.password, '新密码（旧密码已失效）');
      await loadSummary();
    } catch (err) { alert('失败: ' + err.message); }
  });
  document.querySelectorAll('[data-revoke]').forEach(b => b.onclick = async () => {
    const id = parseInt(b.getAttribute('data-revoke'), 10);
    const name = b.getAttribute('data-name');
    if (!confirm(`撤销 ${name} 的访问权限？密码立即失效，但记录保留。`)) return;
    try {
      await api('/hotpot/admin/api/investors/revoke', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
      await loadSummary();
    } catch (err) { alert('失败: ' + err.message); }
  });
  document.querySelectorAll('[data-restore]').forEach(b => b.onclick = async () => {
    const id = parseInt(b.getAttribute('data-restore'), 10);
    try {
      await api('/hotpot/admin/api/investors/restore', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
      await loadSummary();
    } catch (err) { alert('失败: ' + err.message); }
  });
  document.querySelectorAll('[data-delete]').forEach(b => b.onclick = async () => {
    const id = parseInt(b.getAttribute('data-delete'), 10);
    const name = b.getAttribute('data-name');
    if (!confirm(`彻底删除 ${name}？此操作不可恢复（事件记录会保留但失去关联）。`)) return;
    try {
      await api(`/hotpot/admin/api/investors?id=${id}`, { method: 'DELETE' });
      await loadSummary();
    } catch (err) { alert('失败: ' + err.message); }
  });
}

async function openDrawer(investorId) {
  const inv = (last && last.investors || []).find(i => i.id === investorId);
  document.getElementById('drawer-title').textContent = `事件 · ${inv ? inv.name : '#' + investorId}`;
  const evDiv = document.getElementById('drawer-events');
  evDiv.innerHTML = '<div class="loading">Loading…</div>';
  document.getElementById('drawer').classList.add('open');
  try {
    const data = await api(`/hotpot/admin/api/events?investor_id=${investorId}&limit=200`);
    if (!data || data.events.length === 0) {
      evDiv.innerHTML = '<div class="empty">该投资人尚无事件。</div>';
      return;
    }
    evDiv.innerHTML = data.events.map(e => `
      <div class="ev">
        <div class="ts">${fmtTs(e.ts)} · ${fmtRelative(e.ts)}</div>
        <div><span class="action ${escapeHtml(e.action)}">${escapeHtml(e.action)}</span>${e.detail ? `<span class="detail">${escapeHtml(e.detail)}</span>` : ''}</div>
        <div class="meta">${escapeHtml(e.ip)} · ${escapeHtml(e.country)} · ${escapeHtml((e.ua || '').slice(0, 80))}</div>
      </div>`).join('');
  } catch (err) {
    evDiv.innerHTML = `<div class="empty">加载失败: ${escapeHtml(err.message)}</div>`;
  }
}

function showPasswordModal(name, password, title) {
  document.getElementById('pw-title').textContent = title;
  document.getElementById('pw-who').textContent = `投资人: ${name}`;
  document.getElementById('pw-value').textContent = password;
  document.getElementById('pw-modal').classList.add('open');
}

document.getElementById('pw-copy').onclick = async () => {
  const pw = document.getElementById('pw-value').textContent;
  try { await navigator.clipboard.writeText(pw); document.getElementById('pw-copy').textContent = '已复制 ✓'; }
  catch (_) {}
};
document.getElementById('pw-close').onclick = () => document.getElementById('pw-modal').classList.remove('open');
document.getElementById('drawer-close').onclick = () => document.getElementById('drawer').classList.remove('open');
document.getElementById('refresh').onclick = () => loadSummary();
document.getElementById('logout').onclick = async () => {
  await fetch('/hotpot/admin/logout', { method: 'POST', credentials: 'include' });
  location.href = '/hotpot/admin/';
};

loadSummary();
setInterval(() => loadSummary().catch(() => {}), 30000);
</script>
</body>
</html>
